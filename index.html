<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출석 관리 시스템</title>
    <style>
        /* 기본 스타일 리셋 및 배경 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }
        body {
            background-color: #f4f6f8;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .phone-container {
            width: 100%;
            max-width: 430px;
            background-color: #ffffff;
            border-radius: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 상단 그린 영역 */
        .header-green {
            background: linear-gradient(135deg, #72c947, #4caf50);
            padding: 30px 20px 40px 20px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            color: white;
            text-align: center;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
        }
        .nav-btn {
            background-color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .nav-btn.blue { color: #2196f3; }
        .nav-btn.orange { color: #ff9800; }
        .nav-btn.green { color: #4caf50; }
        .nav-btn.purple { color: #9c27b0; }

        .class-selector {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .class-selector span {
            border-bottom: 1px dashed rgba(255,255,255,0.8);
            margin: 0 4px;
            padding-bottom: 2px;
        }

        /* 통계 및 설정 영역 */
        .content-section {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .stats-and-settings {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stats-text {
            font-size: 15px;
            font-weight: bold;
            color: #333;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            border: 1px solid #dcdcdc;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .action-btn.green { background-color: #edf7ed; color: #1e4620; border-color: #c4e5c4; }
        .action-btn.blue { background-color: #e3f2fd; color: #0d47a1; border-color: #bbdefb; }

        /* 학생 목록 스타일 */
        .student-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 4px;
        }
        
        /* [수정 반영] 학생 카드 내 레이아웃 중앙 정렬 보완 */
        .student-card {
            background-color: #ffffff;
            border: 1px solid #eaeaea;
            border-radius: 18px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center; /* 카드 내부의 왼쪽 정보와 오른쪽 체크박스 그룹을 수직 중앙 정렬 */
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        /* [핵심 수정] 이미지와 텍스트를 감싸는 영역의 수직 중앙 정렬 설정 */
        .student-info {
            flex: 1;
            display: flex;
            align-items: center;  /* 이미지와 이름/직분 텍스트가 서로 완벽히 수직 중앙에 위치하도록 함 */
            gap: 14px;            /* 이미지와 텍스트 사이의 간격 */
        }

        /* [핵심 수정] 사진 추가 전/후 이미지 정렬 및 공간 고정 */
        .list-student-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #e0e0e0;
            background-color: #f8f9fa;
            display: flex;           /* 내부 SVG가 있을 때 중앙 정렬을 위해 flex 지정 */
            align-items: center;     /* 수직 중앙 */
            justify-content: center; /* 수평 중앙 */
            flex-shrink: 0;          /* 부모 너비가 변해도 원형이 찌그러지지 않도록 보호 */
            overflow: hidden;
        }
        .list-student-img svg {
            width: 100%;
            height: 100%;
            fill: #cbd5e1;
        }

        .name-and-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .student-name {
            font-size: 16px;
            font-weight: bold;
            color: #0066cc;
            text-decoration: underline;
            cursor: pointer;
        }
        .student-title {
            font-size: 11px;
            color: #666;
            background-color: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            width: fit-content;
        }

        /* 체크박스 선택 영역 */
        .attendance-options {
            display: flex;
            gap: 10px;
        }
        .option-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .option-label {
            font-size: 11px;
            color: #777;
        }
        .opt-check {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        /* 플로팅 추가 버튼 */
        .fab-button {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #ff7b62, #ff5252);
            border-radius: 50%;
            box-shadow: 0 4px 12px rgba(255,82,82,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
            cursor: pointer;
            border: none;
            transition: transform 0.2s;
        }
        .fab-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="header-green">
        <div class="nav-buttons">
            <button class="nav-btn blue">🔍 조회</button>
            <button class="nav-btn purple">💬 문자</button>
            <button class="nav-btn orange">🖨️ 인쇄</button>
            <button class="nav-btn green">💾 저장</button>
        </div>
        <div class="class-selector">
            [<span>무슨</span>]부 [<span>몇</span>] 학년 [<span>몇</span>] 반
        </div>
    </div>

    <div class="content-section">
        <div class="stats-and-settings">
            <div class="stats-text" id="statsDisplay">참석: 0명 | 결석: 0명</div>
            <div class="action-buttons">
                <button class="action-btn green">⚙️ 출석항목</button>
                <button class="action-btn blue">⚙️ 직분설정</button>
            </div>
        </div>

        <div class="student-list" id="studentListContainer">
            </div>
    </div>

    <button class="fab-button">+</button>
</div>

<script>
    // 기본 프로필 SVG (중앙 정렬이 올바르게 설계된 SVG 패스)
    const defaultProfileSVG = `
        <svg viewBox="0 0 24 24">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
    `;

    // 샘플 데이터 (화면에 표시된 5명 목사님 데이터)
    const studentsData = [
        { id: "01", name: "강경구", role: "목사" },
        { id: "02", name: "정순봉", role: "목사" },
        { id: "03", name: "문종수", role: "목사" },
        { id: "04", name: "김도은", role: "목사" },
        { id: "05", name: "김만겸", role: "목사" }
    ];

    // 학생 목록 화면에 그리기
    const container = document.getElementById('studentListContainer');
    
    function renderStudents() {
        container.innerHTML = '';
        studentsData.forEach(student => {
            const card = document.createElement('div');
            card.className = 'student-card';
            card.innerHTML = `
                <div class="student-info">
                    <div class="list-student-img">
                        ${defaultProfileSVG}
                    </div>
                    <div class="name-and-title">
                        <div class="student-name">${student.id}${student.name}</div>
                        <div class="student-title">${student.role}</div>
                    </div>
                </div>
                <div class="attendance-options">
                    <div class="option-group">
                        <span class="option-label">출석</span>
                        <input type="checkbox" class="opt-check attendance-chk" data-id="${student.id}" data-type="attend">
                    </div>
                    <div class="option-group">
                        <span class="option-label">결석</span>
                        <input type="checkbox" class="opt-check absence-chk" data-id="${student.id}" data-type="absent">
                    </div>
                    <div class="option-group">
                        <span class="option-label">결석계</span>
                        <input type="checkbox" class="opt-check" data-id="${student.id}" data-type="note">
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
        
        setupCheckboxLogic();
    }

    // 출석/결석 상호 배타적 선택 기능 및 상단 카운트 기능 작동 체크
    function setupCheckboxLogic() {
        const attendanceChecks = document.querySelectorAll('.attendance-chk');
        const absenceChecks = document.querySelectorAll('.absence-chk');

        function updateStats() {
            const attendCount = document.querySelectorAll('.attendance-chk:checked').length;
            const absentCount = document.querySelectorAll('.absence-chk:checked').length;
            document.getElementById('statsDisplay').innerText = `참석: ${attendCount}명 | 결석: ${absentCount}명`;
        }

        attendanceChecks.forEach(chk => {
            chk.addEventListener('change', function() {
                if(this.checked) {
                    // 출석 체크 시 동일 행의 결석 해제
                    const id = this.getAttribute('data-id');
                    document.querySelector(`.absence-chk[data-id="${id}"]`).checked = false;
                }
                updateStats();
            });
        });

        absenceChecks.forEach(chk => {
            chk.addEventListener('change', function() {
                if(this.checked) {
                    // 결석 체크 시 동일 행의 출석 해제
                    const id = this.getAttribute('data-id');
                    document.querySelector(`.attendance-chk[data-id="${id}"]`).checked = false;
                }
                updateStats();
            });
        });
    }

    // 초기 실행
    renderStudents();
</script>

</body>
</html>
